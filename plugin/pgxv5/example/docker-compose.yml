version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-pgxv5-test
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: p123
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_pgxv5_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_pgxv5_data:

