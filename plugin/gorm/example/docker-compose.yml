version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-gorm-test
    environment:
      MYSQL_ROOT_PASSWORD: p123
      MYSQL_DATABASE: testdb
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pp123"]
      interval: 5s
      timeout: 5s
      retries: 10

