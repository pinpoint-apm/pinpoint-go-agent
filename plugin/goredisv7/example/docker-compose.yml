version: '3.8'

services:
  redis-1:
    image: redis:7-alpine
    container_name: redis-goredisv7-test-1
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-2:
    image: redis:7-alpine
    container_name: redis-goredisv7-test-2
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --port 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

