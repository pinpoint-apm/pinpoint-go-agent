version: '3.8'

services:
  cassandra:
    image: cassandra:4.1
    container_name: cassandra-gocql-test
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=TestCluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep UN"]
      interval: 10s
      timeout: 10s
      retries: 30
    volumes:
      - cassandra_data:/var/lib/cassandra

volumes:
  cassandra_data:

