version: '3.8'

services:
  oracle:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle-test
    environment:
      ORACLE_PWD: tiger
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s scott/tiger@//localhost:1521/xe || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

