version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: mongodb-mongodriver-test
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: testdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

